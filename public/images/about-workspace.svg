<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-labelledby="aboutArtTitle">
  <title id="aboutArtTitle">Developer workspace illustration</title>
  <defs>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f3b55"/>
      <stop offset="100%" stop-color="#1d2433"/>
    </linearGradient>
  </defs>

  <!-- ambient dots -->
  <g fill="#abb2bf" opacity="0.45">
    <circle cx="28" cy="36" r="2"/><circle cx="44" cy="36" r="2"/><circle cx="60" cy="36" r="2"/>
    <circle cx="28" cy="52" r="2"/><circle cx="44" cy="52" r="2"/><circle cx="60" cy="52" r="2"/>
    <circle cx="28" cy="68" r="2"/><circle cx="44" cy="68" r="2"/><circle cx="60" cy="68" r="2"/>
    <circle cx="400" cy="320" r="2"/><circle cx="416" cy="320" r="2"/><circle cx="432" cy="320" r="2"/>
    <circle cx="400" cy="336" r="2"/><circle cx="416" cy="336" r="2"/><circle cx="432" cy="336" r="2"/>
    <circle cx="400" cy="352" r="2"/><circle cx="416" cy="352" r="2"/><circle cx="432" cy="352" r="2"/>
  </g>

  <!-- accent frames -->
  <rect x="36" y="88" width="72" height="72" fill="none" stroke="#8d5cf0" stroke-width="1.5" opacity="0.7"/>
  <rect x="52" y="104" width="72" height="72" fill="none" stroke="#ff80ff" stroke-width="1.5" opacity="0.55"/>

  <!-- editor window -->
  <rect x="90" y="70" width="320" height="280" rx="12" fill="url(#panelGlow)" stroke="#cacfd7" stroke-opacity="0.35"/>
  <rect x="90" y="70" width="320" height="36" rx="12" fill="#323c52"/>
  <rect x="90" y="88" width="320" height="18" fill="#323c52"/>
  <circle cx="112" cy="88" r="5" fill="#ff80ff"/>
  <circle cx="130" cy="88" r="5" fill="#96bee9"/>
  <circle cx="148" cy="88" r="5" fill="#cacfd7"/>
  <text x="250" y="93" text-anchor="middle" fill="#cacfd7" font-family="Fira Code, monospace" font-size="11">about.js</text>

  <!-- code lines -->
  <g font-family="Fira Code, monospace" font-size="13">
    <text x="118" y="140" fill="#7971f4">const</text>
    <text x="168" y="140" fill="#ff80ff">luis</text>
    <text x="208" y="140" fill="#cacfd7">= {</text>

    <text x="132" y="170" fill="#96bee9">role:</text>
    <text x="178" y="170" fill="#fff">"Web Developer"</text>
    <text x="318" y="170" fill="#cacfd7">,</text>

    <text x="132" y="200" fill="#96bee9">focus:</text>
    <text x="188" y="200" fill="#fff">["UI/UX", "React"]</text>
    <text x="348" y="200" fill="#cacfd7">,</text>

    <text x="132" y="230" fill="#96bee9">stack:</text>
    <text x="188" y="230" fill="#fff">"MERN"</text>
    <text x="248" y="230" fill="#cacfd7">,</text>

    <text x="132" y="260" fill="#96bee9">openTo:</text>
    <text x="198" y="260" fill="#fff">"Remote work"</text>

    <text x="118" y="290" fill="#cacfd7">};</text>

    <text x="118" y="320" fill="#7971f4">export default</text>
    <text x="238" y="320" fill="#ff80ff">luis</text>
    <text x="278" y="320" fill="#cacfd7">;</text>
  </g>
</svg>
